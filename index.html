<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎱 로또 번호 생성기</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #fff;
      overflow: hidden;
    }

    /* Animated background particles */
    .bg-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-particles span {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      animation: float 20s infinite linear;
    }
    .bg-particles span:nth-child(1) { width: 300px; height: 300px; top: -10%; left: 20%; animation-duration: 25s; }
    .bg-particles span:nth-child(2) { width: 200px; height: 200px; top: 60%; left: 70%; animation-duration: 18s; animation-delay: -5s; }
    .bg-particles span:nth-child(3) { width: 400px; height: 400px; top: 30%; left: -10%; animation-duration: 30s; animation-delay: -10s; }
    .bg-particles span:nth-child(4) { width: 150px; height: 150px; top: 80%; left: 40%; animation-duration: 22s; animation-delay: -3s; }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
      50% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0.5; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
      background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2rem;
    }

    /* Lotto balls */
    .balls-area {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 80px;
      align-items: center;
      margin-bottom: 2rem;
    }

    .ball {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      position: relative;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 -3px 6px rgba(0,0,0,0.2), inset 0 3px 6px rgba(255,255,255,0.15);
      opacity: 0;
      transform: scale(0) rotate(-180deg);
      animation: ballPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Color groups by number range */
    .ball.range-1 { background: linear-gradient(145deg, #ffc107, #e6a800); } /* 1-10 */
    .ball.range-2 { background: linear-gradient(145deg, #2196f3, #1976d2); } /* 11-20 */
    .ball.range-3 { background: linear-gradient(145deg, #e91e63, #c2185b); } /* 21-30 */
    .ball.range-4 { background: linear-gradient(145deg, #4caf50, #388e3c); } /* 31-40 */
    .ball.range-5 { background: linear-gradient(145deg, #9c27b0, #7b1fa2); } /* 41-45 */

    .ball::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 14px;
      width: 16px;
      height: 10px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      transform: rotate(-30deg);
    }

    @keyframes ballPop {
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .ball:nth-child(1) { animation-delay: 0.1s; }
    .ball:nth-child(2) { animation-delay: 0.2s; }
    .ball:nth-child(3) { animation-delay: 0.3s; }
    .ball:nth-child(4) { animation-delay: 0.4s; }
    .ball:nth-child(5) { animation-delay: 0.5s; }
    .ball:nth-child(6) { animation-delay: 0.6s; }

    .placeholder-text {
      color: rgba(255,255,255,0.3);
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Generate button */
    .generate-btn {
      background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
      color: #1a1a2e;
      border: none;
      padding: 16px 48px;
      font-size: 1.15rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(247, 151, 30, 0.4);
      position: relative;
      overflow: hidden;
    }

    .generate-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 6px 30px rgba(247, 151, 30, 0.6);
    }

    .generate-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .generate-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.5s;
    }

    .generate-btn:hover::before {
      left: 100%;
    }

    /* History */
    .history {
      margin-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 1.5rem;
    }

    .history-title {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 180px;
      overflow-y: auto;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .history-item {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      animation: fadeIn 0.3s ease;
    }

    .history-item .mini-ball {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
    }

    .mini-ball.range-1 { background: linear-gradient(145deg, #ffc107, #e6a800); }
    .mini-ball.range-2 { background: linear-gradient(145deg, #2196f3, #1976d2); }
    .mini-ball.range-3 { background: linear-gradient(145deg, #e91e63, #c2185b); }
    .mini-ball.range-4 { background: linear-gradient(145deg, #4caf50, #388e3c); }
    .mini-ball.range-5 { background: linear-gradient(145deg, #9c27b0, #7b1fa2); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .count-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 1.5rem;
    }

    .count-label {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
    }

    .count-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-family: 'Outfit', sans-serif;
    }

    .count-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.35);
    }

    .count-value {
      font-size: 1.3rem;
      font-weight: 700;
      min-width: 24px;
      color: #ffd200;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.25rem; }
      .title { font-size: 1.6rem; }
      .ball { width: 52px; height: 52px; font-size: 1.15rem; }
      .balls-area { gap: 8px; }
      .generate-btn { padding: 14px 36px; font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="bg-particles">
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="container">
    <div class="card">
      <h1 class="title">🎱 로또 번호 생성기</h1>
      <p class="subtitle">행운의 번호를 뽑아보세요!</p>

      <div class="balls-area" id="ballsArea">
        <span class="placeholder-text">버튼을 눌러 번호를 생성하세요</span>
      </div>

      <div class="count-controls">
        <span class="count-label">게임 수</span>
        <button class="count-btn" id="decreaseBtn" onclick="changeCount(-1)">−</button>
        <span class="count-value" id="countValue">1</span>
        <button class="count-btn" id="increaseBtn" onclick="changeCount(1)">+</button>
      </div>

      <button class="generate-btn" id="generateBtn" onclick="generate()">
        🎰 번호 생성
      </button>

      <div class="history" id="historySection" style="display:none;">
        <div class="history-title">📋 이전 번호</div>
        <div class="history-list" id="historyList"></div>
      </div>
    </div>
  </div>

  <script>
    let gameCount = 1;
    const history = [];

    function getBallRange(num) {
      if (num <= 10) return 'range-1';
      if (num <= 20) return 'range-2';
      if (num <= 30) return 'range-3';
      if (num <= 40) return 'range-4';
      return 'range-5';
    }

    function generateNumbers() {
      const numbers = [];
      while (numbers.length < 6) {
        const n = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(n)) numbers.push(n);
      }
      return numbers.sort((a, b) => a - b);
    }

    function changeCount(delta) {
      gameCount = Math.max(1, Math.min(5, gameCount + delta));
      document.getElementById('countValue').textContent = gameCount;
    }

    function generate() {
      const area = document.getElementById('ballsArea');
      area.innerHTML = '';

      const allGames = [];
      for (let g = 0; g < gameCount; g++) {
        allGames.push(generateNumbers());
      }

      allGames.forEach((numbers, gameIdx) => {
        const row = document.createElement('div');
        row.style.display = 'flex';
        row.style.justifyContent = 'center';
        row.style.gap = '10px';
        row.style.marginBottom = gameIdx < allGames.length - 1 ? '12px' : '0';

        numbers.forEach((num, i) => {
          const ball = document.createElement('div');
          ball.className = `ball ${getBallRange(num)}`;
          ball.textContent = num;
          ball.style.animationDelay = `${(gameIdx * 6 + i) * 0.08 + 0.1}s`;
          row.appendChild(ball);
        });

        area.appendChild(row);
      });

      // Add to history
      allGames.forEach(numbers => {
        history.unshift(numbers);
      });

      // Keep max 10 in history
      while (history.length > 10) history.pop();

      renderHistory();
    }

    function renderHistory() {
      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');

      if (history.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      list.innerHTML = '';

      history.forEach(numbers => {
        const item = document.createElement('div');
        item.className = 'history-item';
        numbers.forEach(num => {
          const ball = document.createElement('span');
          ball.className = `mini-ball ${getBallRange(num)}`;
          ball.textContent = num;
          item.appendChild(ball);
        });
        list.appendChild(item);
      });
    }
  </script>
</body>
</html>
